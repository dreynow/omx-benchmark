# OnlyMetrix CI — governed metric change detection for dbt PRs.
#
# The "decisions at risk" line in the PR comment is the differentiator:
# no other CI tool shows which business decisions are invalidated by a
# schema change. Cloud mode shows decision history; self-hosted shows
# canvas impact only.
#
# This workflow installs onlymetrix from a git tag (v0.6.0+). Once the
# package is on PyPI, switch to `pip install onlymetrix>=0.6.0`.

name: OnlyMetrix CI

on:
  pull_request:
    paths:
      - 'benchmark_dbt/models/**'
      - 'benchmark_dbt/**/*.yml'
      - '.omx/ir.lock.json'
      - '.github/workflows/omx-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  omx-check:
    runs-on: ubuntu-latest
    env:
      OMX_API_URL: ${{ secrets.OMX_API_URL }}
      OMX_API_KEY: ${{ secrets.OMX_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt + OnlyMetrix
        run: |
          pip install --quiet dbt-core dbt-postgres
          pip install --quiet "git+https://github.com/dreynow/onlymetrix-python@v0.6.0"

      - name: dbt parse (manifest only — no warehouse needed)
        working-directory: benchmark_dbt
        env:
          DB_USER: postgres
          DB_PASSWORD: ''
          DB_NAME: retail
        run: dbt parse

      - name: Run omx ci check
        id: omx_check
        continue-on-error: true
        run: |
          # Baseline priority: API (if secret set) -> .omx/ir.lock.json -> --strict fail.
          if [ -n "$OMX_API_URL" ]; then
            omx ci check \
              --manifest benchmark_dbt/target/manifest.json \
              --api-url "$OMX_API_URL" \
              --api-key "$OMX_API_KEY" \
              --strict
          else
            omx ci check \
              --manifest benchmark_dbt/target/manifest.json \
              --strict
          fi

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { renderComment, MARKER } = require(
              path.resolve(process.env.GITHUB_WORKSPACE, '.github/workflows/format-comment.js')
            );

            let output;
            try {
              output = JSON.parse(fs.readFileSync('omx-ci-output.json', 'utf8'));
            } catch (e) {
              core.setFailed(`omx-ci-output.json missing or invalid: ${e.message}`);
              return;
            }
            const body = renderComment(output);

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.includes(MARKER));

            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
              core.info(`Updated existing OM comment ${prior.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info('Posted new OM comment');
            }

      - name: Fail PR if breaking
        if: steps.omx_check.outcome == 'failure'
        run: |
          echo 'omx reported breaking changes — failing PR build'
          exit 1
